name: "Upload to PyPI"
author: "Björn Ricks <bjoern.ricks@greenbone.net>"
description: "Action to build and upload a release via uv to PyPI"

inputs:
  python-version:
    description: "Python version to use for this action"
    default: "3.10"
  pypi-token:
    description: "Token for uploading the build to PyPI"
    required: false
  ref:
    description: The branch, tag or SHA to checkout. Default depends on the event (https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows).

branding:
  icon: "package"
  color: "green"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.ref }}
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install uv
      uses: greenbone/actions/uv@v3
      with:
        python-version: ${{ inputs.python-version }}
    - name: Build
      run: |
        uv build
      shell: bash
    - name: Upload
      run: |
        # if this fails enable OIDC / trusted publishersetup in the PyPi project(see Readme)
        # and remove the pypi-token variable from the github repo/inputs
        if [ -n "${{ inputs.pypi-token }}" ]; then
          uv publish --token "${{ inputs.pypi-token }}"
        else
          uv publish
        fi
      shell: bash
